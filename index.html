<!DOCTYPE html>
<html lang="und">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>G-AI Desktop</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>

<body>
    <div id="app-header">
        <div class="window-title-bar">
            <div class="window-menu-container">
                <div class="app-logo" title="logo"><img src="assets/icon.png" alt="logo" /></div>
                <div id="dynamic-menus-wrapper"></div>
            </div>

            <div class="window-center-title">G-AI Desktop</div>
            <div class="window-controls">
                <button class="control-btn" id="win-min-btn" title="Minimize">
                    <svg width="10" height="10" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                        <line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1" />
                    </svg></button>
                <button class="control-btn" id="win-max-btn" title="Maxmize"><svg width="10" height="10"
                        viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1" />
                    </svg></button>
                <button class="control-btn close" id="win-close-btn" title="Close"><svg width="10" height="10"
                        viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0,0 L10,10 M10,0 L0,10" stroke="currentColor" stroke-width="1" />
                    </svg></button>
            </div>
        </div>
        <div id="tab-bar">
            <div id="tabs-list"></div>
            <div id="dynamic-add-menus-wrapper"></div>
        </div>
    </div>

    <script src="ui.js"></script>

</body>

</html>
